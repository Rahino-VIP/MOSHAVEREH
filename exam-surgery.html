<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پنل مدیریت ProMax</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: auto; }
        
        .list-section { width: 30%; background: #1e293b; padding: 15px; border-radius: 12px; height: 90vh; overflow-y: auto; }
        .detail-section { width: 70%; background: #1e293b; padding: 20px; border-radius: 12px; display: none; height: 90vh; overflow-y: auto; }
        
        .card { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #475569; }
        .card:hover { border-color: #8b5cf6; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .box { background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #475569; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        th, td { padding: 8px; border: 1px solid #475569; text-align: center; }
        th { background: #334155; }
        
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; color: white; margin-left: 10px; }
        .btn-approve { background: #10b981; }
        .btn-reject { background: #ef4444; }
    </style>
</head>
<body>

    <h2>پنل تایید کارنامه‌های AI ProMax</h2>

    <div class="container">
        <div class="list-section" id="pendingList">
            <h3>پرونده‌های در انتظار ⏳</h3>
            <div id="listContent">در حال بارگذاری...</div>
        </div>

        <div class="detail-section" id="detailArea">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 id="studentInfo">بررسی پرونده</h3>
                <div>
                    <button class="btn btn-reject" onclick="handleDecision('rejected')">❌ رد کارنامه</button>
                    <button class="btn btn-approve" onclick="handleDecision('approved')">✅ تایید و حذف عکس</button>
                </div>
            </div>

            <div class="grid-2">
                <div class="box">
                    <h4 style="margin-bottom:10px;">فایل اصلی (عکس/PDF)</h4>
                    <div id="fileViewer" style="text-align: center;"></div>
                </div>

                <div class="box">
                    <h4 style="margin-bottom:10px;">داده‌های استخراج شده AI</h4>
                    <p style="font-size:12px; color:#f59e0b;">اعتراف: <span id="viewReflection" style="color:#fff;"></span></p>
                    <table id="aiTable">
                        <thead><tr><th>درس</th><th>درست</th><th>غلط</th><th>تراز/درصد</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                    <h4 style="margin-top:15px; font-size: 13px;">تحلیل مشاورانه:</h4>
                    <p id="aiAnalysis" style="font-size: 13px; color:#94a3b8;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 🔗 کلیدهای سوپابیس (حتماً پر شود)
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentExamId = null;

        window.onload = async function() {
            loadPendingExams();
        };

        // دریافت لیست
        async function loadPendingExams() {
            const { data, error } = await supabase
                .from('exam_results')
                .select('*')
                .eq('status', 'pending')
                .order('created_at', { ascending: true });

            const listContent = document.getElementById('listContent');
            listContent.innerHTML = '';

            if (!data || data.length === 0) {
                listContent.innerHTML = '<p style="color:#94a3b8; text-align:center;">پرونده‌ای در صف نیست.</p>';
                return;
            }

            data.forEach(exam => {
                listContent.innerHTML += `
                    <div class="card" onclick='openDetail(${JSON.stringify(exam)})'>
                        <strong>بازه:</strong> ${exam.period_start} تا ${exam.period_end}<br>
                        <span style="font-size:11px; color:#94a3b8;">آیدی چت: ${exam.chat_id}</span>
                    </div>
                `;
            });
        }

        // نمایش جزئیات
        function openDetail(exam) {
            currentExamId = exam.id;
            document.getElementById('detailArea').style.display = 'block';
            document.getElementById('studentInfo').innerText = `پرونده چت آیدی: ${exam.chat_id}`;
            document.getElementById('viewReflection').innerText = exam.student_reflection;
            document.getElementById('aiAnalysis').innerText = exam.consultant_analysis;

            // نمایش فایل (PDF یا عکس)
            const viewer = document.getElementById('fileViewer');
            if (!exam.exam_file_base64) {
                viewer.innerHTML = '<p>بدون فایل ضمیمه (هفته روتین)</p>';
            } else if (exam.file_type === 'application/pdf') {
                viewer.innerHTML = `<iframe src="data:application/pdf;base64,${exam.exam_file_base64}" width="100%" height="400px" style="border:none; border-radius:8px;"></iframe>`;
            } else {
                viewer.innerHTML = `<img src="data:${exam.file_type || 'image/jpeg'};base64,${exam.exam_file_base64}" style="max-width:100%; border-radius:8px;">`;
            }

            // پر کردن جدول
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            let lessons = typeof exam.extracted_data === 'string' ? JSON.parse(exam.extracted_data) : exam.extracted_data;
            
            if(lessons && lessons.length > 0) {
                lessons.forEach(l => {
                    tbody.innerHTML += `<tr><td>${l.name}</td><td>${l.correct}</td><td>${l.incorrect}</td><td>${l.taraz}</td></tr>`;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="4">دیتای درسی استخراج نشده است</td></tr>`;
            }
        }

        // تایید یا رد
        async function handleDecision(decision) {
            if (!currentExamId) return;
            
            if(confirm(`آیا از ${decision === 'approved' ? 'تایید' : 'رد'} این کارنامه مطمئن هستید؟`)) {
                
                // 💣 جادوی خودتخریب‌گر: در صورت تصمیم‌گیری، فایل‌ها از دیتابیس Null (پاک) می‌شوند!
                const { error } = await supabase
                    .from('exam_results')
                    .update({ 
                        status: decision,
                        exam_file_base64: null, 
                        file_type: null 
                    })
                    .eq('id', currentExamId);

                if(error) {
                    alert('خطا در ثبت: ' + error.message);
                } else {
                    alert('با موفقیت ثبت شد و عکس از دیتابیس پاک گردید.');
                    document.getElementById('detailArea').style.display = 'none';
                    loadPendingExams(); // رفرش لیست
                }
            }
        }
    </script>
</body>
</html>
