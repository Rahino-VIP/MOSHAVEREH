<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به اتاق فرمان | راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-dark: #05080f; 
            --surface: #0f172a; 
            --border: #1e293b;
            --accent: #3b82f6; 
            --accent-hover: #2563eb;
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: relative; }

        /* افکت‌های پس‌زمینه */
        .glow { position: absolute; width: 400px; height: 400px; background: rgba(59, 130, 246, 0.15); filter: blur(100px); border-radius: 50%; z-index: 0; }

        .login-card { background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 400px; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 1; position: relative; }
        
        .brand { text-align: center; font-size: 24px; font-weight: 900; margin-bottom: 5px; letter-spacing: 1px; }
        .brand span { color: var(--accent); }
        .subtitle { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 30px; }

        .input-group { margin-bottom: 20px; }
        .input-label { display: block; font-size: 13px; font-weight: bold; color: var(--text-muted); margin-bottom: 8px; }
        .modern-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-dark); color: var(--text-main); font-size: 14px; outline: none; transition: 0.3s; text-align: left; direction: ltr; }
        .modern-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2); }

        .btn-login { background: var(--accent); color: white; width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: var(--accent-hover); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        .error-msg { color: var(--danger); font-size: 13px; text-align: center; margin-top: 15px; display: none; font-weight: bold; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 8px; border: 1px solid rgba(239, 68, 68, 0.2); }

        .loader { display: none; margin: 0 auto; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid white; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="login-card">
        <div class="brand">قطب‌نمای <span>راهینو</span></div>
        <div class="subtitle">Secure Admin Cockpit</div>

        <div class="input-group">
            <label class="input-label">ایمیل سازمانی (Email)</label>
            <input type="email" id="email" class="modern-input" placeholder="admin@rahino.com" autocomplete="off">
        </div>

        <div class="input-group">
            <label class="input-label">رمز عبور (Password)</label>
            <input type="password" id="password" class="modern-input" placeholder="••••••••" autocomplete="off">
        </div>

        <button class="btn-login" id="loginBtn" onclick="handleLogin()">
            <span id="btnText">ورود به سیستم</span>
            <div class="loader" id="btnLoader"></div>
        </button>

        <div class="error-msg" id="errorBox">ایمیل یا رمز عبور اشتباه است.</div>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات اتصال سوپابیس
        // ==========================================
    const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
               
    // تغییر نام متغیر از supabase به supabaseClient برای جلوگیری از ارور تداخل
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // بررسی اینکه آیا ادمین قبلاً لاگین کرده یا نه
    window.onload = async function() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            // اگر سشن فعال بود، مستقیم بره به داشبورد
            window.location.replace('dashboard.html');
        }
    };

    async function handleLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('btnLoader');
        const errorBox = document.getElementById('errorBox');

        if (!email || !password) {
            errorBox.innerText = "لطفاً ایمیل و رمز عبور را وارد کنید.";
            errorBox.style.display = 'block';
            return;
        }

        // استایل دکمه در حالت لودینگ
        btn.disabled = true;
        btnText.style.display = 'none';
        loader.style.display = 'block';
        errorBox.style.display = 'none';

        try {
            // ارسال درخواست لاگین به سوپابیس با متغیر جدید
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) throw error;

            // لاگین موفقیت‌آمیز
            window.location.replace('dashboard.html');

        } catch (error) {
            // لاگین ناموفق
            console.error(error);
            btn.disabled = false;
            btnText.style.display = 'block';
            loader.style.display = 'none';
            
            errorBox.innerText = "دسترسی غیرمجاز! ایمیل یا رمز عبور اشتباه است.";
            errorBox.style.display = 'block';
        }
    }

    // ورود با زدن دکمه Enter
    document.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleLogin();
    });
</script>
