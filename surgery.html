<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتاق جراحی تقویم | راهینو VIP</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-dark: #0f172a; --surface-dark: #1e293b; --surface-light: #334155; --border-color: #475569;
            --accent: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --time-col-width: 60px;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; user-select: none; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* لودرها */
        .loader-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; transition: 0.5s; }
        .spinner { font-size: 50px; animation: pulse 1s infinite alternate; margin-bottom: 15px; }
        @keyframes pulse { 0% { transform: scale(0.8); } 100% { transform: scale(1.1); } }
        #aiStatus { font-size: 13px; color: var(--warning); margin-top: 10px; height: 20px; font-weight: bold; }

        /* 🎛️ سایدبار مدیریت */
        .side-panel { width: 340px; background: var(--surface-dark); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 20; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); }
        .btn-back { background: var(--surface-light); border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 18px; transition: 0.2s; }
        .btn-back:hover { background: var(--danger); border-color: var(--danger); }
        .student-info h2 { font-size: 16px; font-weight: 900; color: var(--accent); margin-bottom: 3px; }
        .student-info p { font-size: 11px; color: var(--text-muted); }

        .panel-body { padding: 15px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        
        /* دستیار هوشمند */
        .ai-assistant { background: rgba(245, 158, 11, 0.05); border: 1px solid var(--warning); padding: 15px; border-radius: 12px; position: relative; }
        .ai-assistant::before { content: '💬 یادداشت دانش‌آموز'; position: absolute; top: -10px; right: 15px; background: var(--surface-dark); padding: 0 10px; font-size: 11px; color: var(--warning); font-weight: bold; }
        .ai-text { font-size: 12px; color: var(--text-main); line-height: 1.6; }

        /* فرم افزودن دستی */
        .add-block-form { background: var(--surface-light); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; }
        .form-title { font-size: 12px; font-weight: bold; margin-bottom: 10px; color: var(--text-main); display: flex; justify-content: space-between; }
        .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .input-css { flex: 1; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 10px; border-radius: 8px; font-size: 12px; outline: none; width: 100%; }
        .btn-add { background: var(--accent); border: none; color: white; width: 100%; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 5px; }
        .btn-add:hover { filter: brightness(1.1); }

        .panel-footer { padding: 15px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; font-family: 'Vazirmatn'; margin-bottom: 10px; }
        .btn-approve { background: linear-gradient(135deg, var(--success), #059669); color: white; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2); }
        .btn-approve:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); }
        .btn-reject { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-reject:hover { background: rgba(239, 68, 68, 0.1); }

        /* 🗓️ تقویم جراحی (Scale 0.8 -> 48px per hour) */
        .calendar-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); overflow: hidden; }
        .calendar-header { display: flex; background: var(--surface-dark); border-bottom: 1px solid var(--border-color); z-index: 15; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .time-spacer { width: var(--time-col-width); border-left: 1px solid var(--border-color); flex-shrink: 0; }
        .day-header { flex: 1; text-align: center; padding: 12px 0; font-size: 13px; font-weight: bold; border-left: 1px solid var(--border-color); color: var(--text-main); }
        .day-header.friday { border-left: none; color: var(--danger); }

        .calendar-body { flex: 1; overflow-y: auto; position: relative; display: flex; }
        .time-column { width: var(--time-col-width); background: var(--surface-dark); border-left: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; position: relative; }
        /* ارتفاع هر ساعت 48 پیکسل شد */
        .time-label { height: 48px; display: flex; justify-content: center; padding-top: 5px; font-size: 11px; color: var(--text-muted); font-family: monospace; border-bottom: 1px solid transparent; }
        
        .days-grid { flex: 1; display: flex; position: relative; background-image: linear-gradient(var(--border-color) 1px, transparent 1px); background-size: 100% 48px; }
        .day-column { flex: 1; border-left: 1px solid var(--border-color); position: relative; min-height: 100%; }
        .day-column:last-child { border-left: none; }

        /* 🧱 بلوک‌های درسی (Solid Colors) */
        .event-block { position: absolute; left: 4px; right: 4px; border-radius: 8px; padding: 6px 8px; font-size: 11px; cursor: grab; transition: box-shadow 0.2s, filter 0.2s; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 5; color: white; border: 1px solid rgba(255,255,255,0.1); }
        .event-block:active { cursor: grabbing; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.6); filter: brightness(1.1); }
        
        .event-time { font-size: 10px; opacity: 0.9; font-family: monospace; margin-bottom: 2px; font-weight: bold; pointer-events: none; background: rgba(0,0,0,0.2); padding: 2px 5px; border-radius: 4px; display: inline-block; width: fit-content; }
        .event-title { font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; font-size: 13px; margin-top: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        .event-desc { font-size: 10px; opacity: 0.85; margin-top: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        
        /* دکمه‌های شناور (حذف و کپی) */
        .event-actions { position: absolute; top: 5px; left: 5px; display: none; gap: 4px; z-index: 10; }
        .event-block:hover .event-actions { display: flex; }
        .action-btn { background: rgba(0,0,0,0.6); border-radius: 4px; padding: 3px 6px; font-size: 10px; cursor: pointer; color: white; transition: 0.2s; }
        .action-btn:hover { background: rgba(0,0,0,0.9); transform: scale(1.1); }

        .resizer { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; cursor: ns-resize; background: rgba(0,0,0,0.2); transition: 0.2s; }
        .resizer:hover { background: rgba(0,0,0,0.4); }

        /* رنگ‌بندی جدید و بسیار جذاب */
        .event-bio { background: linear-gradient(135deg, #10b981, #059669); } 
        .event-math { background: linear-gradient(135deg, #f59e0b, #d97706); } 
        .event-chem { background: linear-gradient(135deg, #3b82f6, #2563eb); } 
        .event-phys { background: linear-gradient(135deg, #8b5cf6, #6d28d9); } 
        .event-exam { background: linear-gradient(135deg, #ef4444, #dc2626); } 
        .event-break { background: linear-gradient(135deg, #475569, #334155); color: #cbd5e1; border: 1px dashed #94a3b8; } 
        .event-default { background: linear-gradient(135deg, #64748b, #475569); } 
    </style>
</head>
<body>

    <div class="loader-overlay" id="mainLoader">
        <div class="spinner">⚙️</div>
        <h3 id="loaderTitle" style="color: var(--accent);">آماده‌سازی اتاق جراحی و پردازش تقویم...</h3>
        <div id="aiStatus"></div>
    </div>

    <div class="side-panel">
        <div class="panel-header">
            <a href="quarantine.html" class="btn-back">🔙</a>
            <div class="student-info">
                <h2 id="stName">در حال دریافت...</h2>
                <p id="stMeta">...</p>
            </div>
        </div>

        <div class="panel-body">
            <div class="ai-assistant">
                <div class="ai-text" id="stNote">در حال پردازش...</div>
            </div>

            <div class="add-block-form">
                <div class="form-title">
                    <span>➕ افزودن پارت دستی</span>
                </div>
                <div class="form-row">
                    <select id="newDay" class="input-css">
                        <option value="شنبه">شنبه</option><option value="یکشنبه">یکشنبه</option>
                        <option value="دوشنبه">دوشنبه</option><option value="سه‌شنبه">سه‌شنبه</option>
                        <option value="چهارشنبه">چهارشنبه</option><option value="پنجشنبه">پنجشنبه</option>
                        <option value="جمعه">جمعه</option>
                    </select>
                    <input type="time" id="newTime" class="input-css" value="16:00">
                </div>
                <div class="form-row">
                    <input type="text" id="newSubject" class="input-css" placeholder="نام درس (مثلاً زیست)">
                    <input type="number" id="newDuration" class="input-css" placeholder="زمان (دقیقه)" value="90">
                </div>
                <div class="form-row">
                    <input type="text" id="newTopic" class="input-css" placeholder="مبحث (مثلاً فصل ۱)">
                    <input type="number" id="newTests" class="input-css" placeholder="تعداد تست" value="0">
                </div>
                <button class="btn-add" onclick="addNewBlock()">تزریق پارت به تقویم</button>
            </div>
        </div>

        <div class="panel-footer">
            <button class="btn-action btn-approve" id="btnApprove" onclick="saveAndApproveWithAI()">✅ تولید محتوای هوشمند و ارسال</button>
            <button class="btn-action btn-reject" id="btnReject" onclick="rejectSchedule()">❌ رد و حذف برنامه</button>
        </div>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <div class="time-spacer"></div>
            <div class="day-header">شنبه</div><div class="day-header">یکشنبه</div>
            <div class="day-header">دوشنبه</div><div class="day-header">سه‌شنبه</div>
            <div class="day-header">چهارشنبه</div><div class="day-header">پنجشنبه</div>
            <div class="day-header friday">جمعه</div>
        </div>

        <div class="calendar-body" id="scrollArea">
            <div class="time-column" id="timeColumn"></div>
            <div class="days-grid" id="daysGrid">
                <div class="day-column" id="col-0" data-dayindex="0"></div>
                <div class="day-column" id="col-1" data-dayindex="1"></div>
                <div class="day-column" id="col-2" data-dayindex="2"></div>
                <div class="day-column" id="col-3" data-dayindex="3"></div>
                <div class="day-column" id="col-4" data-dayindex="4"></div>
                <div class="day-column" id="col-5" data-dayindex="5"></div>
                <div class="day-column" id="col-6" data-dayindex="6"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات و متغیرهای سراسری
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // کلید جمینای برای تولید جملات انگیزشی
        const GEMINI_API_KEY = "AQ.Ab8RN6J791y8Z17huRz8Z7T0sM2bZ7rn1_6cHnVZw2SASkOK4g";

        let currentScheduleId = null;
        let scheduleDataArray = [];
        
        // ضریب فشرده‌سازی تقویم (1 ساعت = 48 پیکسل -> 1 دقیقه = 0.8 پیکسل)
        const PIXELS_PER_MIN = 0.8;
        const MIN_SNAP = 15; // پرش ۱۵ دقیقه‌ای
        const SNAP_PX = MIN_SNAP * PIXELS_PER_MIN; // 12 پیکسل

        const daysArr = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
        const dayMap = { 'شنبه': 0, 'یکشنبه': 1, 'دوشنبه': 2, 'سه‌شنبه': 3, 'چهارشنبه': 4, 'پنجشنبه': 5, 'جمعه': 6 };

        // ==========================================
        // 🚀 راه‌اندازی اولیه
        // ==========================================
        window.onload = async function() {
            const timeCol = document.getElementById('timeColumn');
            for(let i = 6; i <= 24; i++) {
                timeCol.innerHTML += `<div class="time-label">${i.toString().padStart(2, '0')}:00</div>`;
            }

            const urlParams = new URLSearchParams(window.location.search);
            currentScheduleId = urlParams.get('schedule_id');

            if (!currentScheduleId) {
                alert("خطا: هیچ برنامه‌ای انتخاب نشده است!");
                window.location.replace('quarantine.html');
                return;
            }
            await fetchAndRender();
        };

        async function fetchAndRender() {
            try {
                const { data: schData, error: schErr } = await supabaseClient
                    .from('ai_schedules')
                    .select('*')
                    .eq('id', currentScheduleId)
                    .single();
                if (schErr) throw schErr;

                const { data: stData } = await supabaseClient
                    .from('students')
                    .select('full_name, grade, major')
                    .eq('chat_id', schData.chat_id)
                    .single();

                document.getElementById('stName').innerText = stData ? stData.full_name : 'ناشناس';
                document.getElementById('stMeta').innerText = stData ? `${stData.grade} ${stData.major}` : 'اطلاعات نامشخص';
                
                let note = schData.student_note && schData.student_note.trim() !== '' ? schData.student_note : 'بدون یادداشت.';
                document.getElementById('stNote').innerText = note;

                scheduleDataArray = schData.raw_plan || [];
                renderAllBlocks();

                document.getElementById('mainLoader').style.opacity = '0';
                setTimeout(() => { document.getElementById('mainLoader').style.display = 'none'; }, 500);

                // اسکرول به ساعت 07:00 (60 دقیقه * 0.8 = 48px)
                document.getElementById('scrollArea').scrollTop = 48;

            } catch (err) {
                alert("خطا در بارگذاری: " + err.message);
                window.location.replace('quarantine.html');
            }
        }

        // ==========================================
        // 🎨 موتور رسم (رندر) پارت‌ها
        // ==========================================
        function renderAllBlocks() {
            for(let i=0; i<=6; i++) document.getElementById(`col-${i}`).innerHTML = '';

            scheduleDataArray.forEach((part, index) => {
                let colIndex = dayMap[part.day];
                if (colIndex === undefined) return;

                let startMins = timeStrToMins(part.start_time);
                let endMins = timeStrToMins(part.end_time);
                
                let topPx = Math.round((startMins - 360) * PIXELS_PER_MIN); 
                let heightPx = Math.round((endMins - startMins) * PIXELS_PER_MIN);

                let typeClass = "event-default";
                if(part.type) typeClass = `event-${part.type}`;

                const block = document.createElement('div');
                block.className = `event-block ${typeClass}`;
                block.style.top = `${topPx}px`;
                block.style.height = `${heightPx}px`;
                block.dataset.index = index; 

                block.innerHTML = `
                    <div class="event-actions">
                        <div class="action-btn" title="حذف" onclick="deleteBlock(${index}, event)">🗑️</div>
                        <div class="action-btn" title="کپی" onclick="cloneBlock(${index}, event)">📋</div>
                    </div>
                    <div class="event-time">${part.start_time} - ${part.end_time}</div>
                    <div class="event-title">${part.subject}</div>
                    <div class="event-desc">${part.topic || ''}</div>
                    <div class="resizer"></div>
                `;

                block.addEventListener('mousedown', handleMouseDown);
                document.getElementById(`col-${colIndex}`).appendChild(block);
            });
        }

        // ==========================================
        // 🖱️ موتور بی‌نقص Drag & Drop معکوس (RTL) و Resize
        // ==========================================
        let isDragging = false; let isResizing = false;
        let activeBlock = null; let activeIndex = -1;
        let startY = 0; let initialTop = 0; let initialHeight = 0;

        function handleMouseDown(e) {
            if (e.button !== 0) return; 
            if (e.target.classList.contains('action-btn')) return; 

            activeBlock = e.currentTarget;
            activeIndex = parseInt(activeBlock.dataset.index);
            startY = e.clientY;
            
            initialTop = parseFloat(activeBlock.style.top) || 0;
            initialHeight = parseFloat(activeBlock.style.height) || 0;

            if (e.target.classList.contains('resizer')) isResizing = true;
            else isDragging = true;

            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }

        function handleMouseMove(e) {
            if (!activeBlock) return;
            let dy = e.clientY - startY;

            if (isResizing) {
                let newHeight = initialHeight + dy;
                newHeight = Math.round(newHeight / SNAP_PX) * SNAP_PX; 
                if (newHeight < SNAP_PX) newHeight = SNAP_PX;
                activeBlock.style.height = `${newHeight}px`;
                updateBlockTimeVisual(activeBlock, initialTop, newHeight);
            } 
            else if (isDragging) {
                let newTop = initialTop + dy;
                newTop = Math.round(newTop / SNAP_PX) * SNAP_PX;
                if (newTop < 0) newTop = 0;
                activeBlock.style.top = `${newTop}px`;
                updateBlockTimeVisual(activeBlock, newTop, initialHeight);

                // حل باگ RTL: محاسبه فاصله از سمت راست!
                const gridRect = document.getElementById('daysGrid').getBoundingClientRect();
                const colWidth = gridRect.width / 7;
                let mouseXRTL = gridRect.right - e.clientX; 
                
                if (mouseXRTL >= 0 && mouseXRTL <= gridRect.width) {
                    let hoveredColIndex = Math.floor(mouseXRTL / colWidth);
                    const currentParentId = activeBlock.parentElement.id;
                    if (currentParentId !== `col-${hoveredColIndex}`) {
                        document.getElementById(`col-${hoveredColIndex}`).appendChild(activeBlock);
                    }
                }
            }
        }

        function handleMouseUp(e) {
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);

            if (activeBlock && activeIndex !== -1) {
                let finalTop = parseFloat(activeBlock.style.top);
                let finalHeight = parseFloat(activeBlock.style.height);
                let finalColIndex = parseInt(activeBlock.parentElement.dataset.dayindex);

                let startMins = Math.round(finalTop / PIXELS_PER_MIN) + 360;
                let endMins = startMins + Math.round(finalHeight / PIXELS_PER_MIN);

                scheduleDataArray[activeIndex].day = daysArr[finalColIndex];
                scheduleDataArray[activeIndex].start_time = minsToTimeStr(startMins);
                scheduleDataArray[activeIndex].end_time = minsToTimeStr(endMins);

                activeBlock = null; isDragging = false; isResizing = false;
            }
        }

        function updateBlockTimeVisual(block, topPx, heightPx) {
            let sMins = Math.round(topPx / PIXELS_PER_MIN) + 360;
            let eMins = sMins + Math.round(heightPx / PIXELS_PER_MIN);
            block.querySelector('.event-time').innerText = `${minsToTimeStr(sMins)} - ${minsToTimeStr(eMins)}`;
        }

        // ==========================================
        // ➕ توابع عملیاتی (حذف، اضافه، کپی)
        // ==========================================
        function deleteBlock(index, e) {
            e.stopPropagation();
            if(confirm("پارت حذف شود؟")) {
                scheduleDataArray.splice(index, 1);
                renderAllBlocks(); 
            }
        }

        function cloneBlock(index, e) {
            e.stopPropagation();
            // کپی دقیق پارت، فقط ۱۵ دقیقه شیفت می‌دیم به پایین تا بیفته روی پارت قبلی
            let original = scheduleDataArray[index];
            let duration = timeStrToMins(original.end_time) - timeStrToMins(original.start_time);
            let newStartMins = timeStrToMins(original.start_time) + MIN_SNAP; 
            
            let clone = JSON.parse(JSON.stringify(original)); // Deep Copy
            clone.start_time = minsToTimeStr(newStartMins);
            clone.end_time = minsToTimeStr(newStartMins + duration);
            
            scheduleDataArray.push(clone);
            renderAllBlocks();
        }

        function addNewBlock() {
            let day = document.getElementById('newDay').value;
            let timeStr = document.getElementById('newTime').value;
            let subject = document.getElementById('newSubject').value;
            let duration = parseInt(document.getElementById('newDuration').value);
            let topic = document.getElementById('newTopic').value;
            let tests = parseInt(document.getElementById('newTests').value);

            if(!subject) { alert("نام درس را وارد کنید!"); return; }

            let startMins = timeStrToMins(timeStr);
            let endMins = startMins + duration;

            let typeClass = "default";
            if(subject.includes("زیست")) typeClass = "bio";
            else if(subject.includes("ریاضی")) typeClass = "math";
            else if(subject.includes("شیمی")) typeClass = "chem";
            else if(subject.includes("فیزیک")) typeClass = "phys";
            else if(subject.includes("آزمون")) typeClass = "exam";

            let finalTopic = topic;
            if(tests > 0) finalTopic += ` | 🎯 هدف: ${tests} تست`;

            scheduleDataArray.push({
                day: day, start_time: minsToTimeStr(startMins), end_time: minsToTimeStr(endMins),
                subject: subject, topic: finalTopic, type: typeClass
            });

            document.getElementById('newSubject').value = "";
            document.getElementById('newTopic').value = "";
            renderAllBlocks();
        }

        // ==========================================
        // 🧠 تولید محتوای هوشمند با جمینای و ذخیره
        // ==========================================
        async function saveAndApproveWithAI() {
            const btn = document.getElementById('btnApprove');
            btn.innerHTML = 'در حال ارتباط با مغز مصنوعی... ⏳';
            btn.disabled = true;

            const loader = document.getElementById('mainLoader');
            document.getElementById('loaderTitle').innerText = "دستیار هوشمند در حال نوشتن پیام‌های انگیزشی است...";
            document.getElementById('aiStatus').innerText = "لطفاً چند ثانیه صبر کنید...";
            loader.style.display = 'flex';
            setTimeout(() => { loader.style.opacity = '1'; }, 10);

            try {
                // ۱. استخراج لیست دروس برای پرامپت
                let subjectsByDay = {};
                scheduleDataArray.forEach(p => {
                    if(!subjectsByDay[p.day]) subjectsByDay[p.day] = [];
                    if(!subjectsByDay[p.day].includes(p.subject) && !p.type.includes("break")) {
                        subjectsByDay[p.day].push(p.subject);
                    }
                });

                // ۲. پرامپت طلایی برای جمینای
                let prompt = `شما یک مشاور تحصیلی دلسوز، پرانرژی و رفیق هستید. یک برنامه درسی برای دانش‌آموزی تنظیم کرده‌ایم.
یادداشت دانش‌آموز: "${document.getElementById('stNote').innerText}"
دروس هر روز او به این شکل است:
${JSON.stringify(subjectsByDay)}

لطفاً دقیقاً یک فایل JSON با ساختار زیر برگردان و هیچ متن اضافه‌ای ننویس:
{
  "weekly_motivation": "یک پاراگراف پرانرژی و خفن برای کل هفته",
  "daily_motivations": {
    "شنبه": "یک جمله کوتاه انگیزشی با توجه به دروس این روز",
    "یکشنبه": "...",
    "دوشنبه": "...",
    "سه‌شنبه": "...",
    "چهارشنبه": "...",
    "پنجشنبه": "...",
    "جمعه": "..."
  }
}`;

                let geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                
                let aiResponse = await fetch(geminiUrl, {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { temperature: 0.7, response_mime_type: "application/json" }
                    })
                });
                
                let aiResult = await aiResponse.json();
                let motivationData = JSON.parse(aiResult.candidates[0].content.parts[0].text);

                document.getElementById('aiStatus').innerText = "ثبت نهایی در پایگاه داده...";

                // ۳. آپدیت دیتابیس
                const { error } = await supabaseClient
                    .from('ai_schedules')
                    .update({ 
                        raw_plan: scheduleDataArray,
                        ai_motivations: motivationData, // ستون جدید یا نگهداری تو JSON
                        status: 'approved' 
                    })
                    .eq('id', currentScheduleId);

                if (error) throw error;
                
                alert("برنامه همراه با پیام‌های هوشمند ذخیره و ارسال شد! 🚀");
                window.location.replace('quarantine.html');

            } catch (err) {
                alert("خطا در پردازش هوشمند: " + err.message);
                btn.innerHTML = '✅ تولید محتوای هوشمند و ارسال';
                btn.disabled = false;
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            }
        }

        async function rejectSchedule() {
            if(confirm("آیا مطمئن هستید که این برنامه کاملاً پاک شود؟")) {
                const btn = document.getElementById('btnReject');
                btn.innerHTML = 'در حال حذف... ⏳';
                btn.disabled = true;
                try {
                    const { error } = await supabaseClient
                        .from('ai_schedules').delete().eq('id', currentScheduleId);
                    if (error) throw error;
                    window.location.replace('quarantine.html');
                } catch (err) {
                    alert("خطا در حذف: " + err.message);
                    btn.innerHTML = '❌ رد و حذف برنامه';
                    btn.disabled = false;
                }
            }
        }

        // ==========================================
        // 🧮 توابع کمکی محاسبات زمان
        // ==========================================
        function timeStrToMins(timeStr) {
            if(!timeStr) return 0;
            let parts = timeStr.split(':');
            return (parseInt(parts[0]) * 60) + parseInt(parts[1]);
        }
        function minsToTimeStr(mins) {
            let h = Math.floor(mins / 60);
            let m = Math.floor(mins % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }
    </script>
</body>
