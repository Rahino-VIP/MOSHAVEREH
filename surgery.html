<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتاق جراحی تقویم | راهینو VIP</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-dark: #090e17; --surface-dark: #121b29; --surface-light: #1e293b; --border-color: #334155;
            --accent: #3b82f6; --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            --time-col-width: 60px;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; user-select: none; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* لودر امنیتی */
        .loader-overlay { position: fixed; inset: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; transition: 0.5s; }
        .spinner { font-size: 50px; animation: pulse 1.5s infinite; margin-bottom: 15px; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* 🎛️ سایدبار (پنل مدیریت) */
        .side-panel { width: 340px; background: var(--surface-dark); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 20; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        .panel-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.2); }
        .btn-back { background: var(--surface-light); border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; text-decoration: none; font-size: 18px; transition: 0.2s; }
        .btn-back:hover { background: var(--danger); border-color: var(--danger); }
        .student-info h2 { font-size: 16px; font-weight: 900; color: var(--accent); margin-bottom: 5px; }
        .student-info p { font-size: 11px; color: var(--text-muted); }

        .panel-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* دستیار هوش مصنوعی */
        .ai-assistant { background: linear-gradient(145deg, rgba(139, 92, 246, 0.1), rgba(139, 92, 246, 0.05)); border: 1px solid var(--purple); padding: 15px; border-radius: 12px; position: relative; }
        .ai-assistant::before { content: '🤖 دستیار جراحی'; position: absolute; top: -10px; right: 15px; background: var(--surface-dark); padding: 0 10px; font-size: 11px; color: var(--purple); font-weight: bold; }
        .ai-text { font-size: 12px; color: var(--text-main); line-height: 1.8; margin-bottom: 10px; }
        .st-note-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; border-right: 3px solid var(--warning); font-size: 11px; color: var(--text-muted); }

        /* فرم افزودن دستی */
        .add-block-form { background: var(--surface-light); border: 1px solid var(--border-color); padding: 15px; border-radius: 12px; }
        .form-title { font-size: 12px; font-weight: bold; margin-bottom: 10px; color: var(--text-muted); }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .input-css { flex: 1; background: var(--bg-dark); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 10px; border-radius: 8px; font-size: 12px; outline: none; }
        .btn-add { background: var(--surface-dark); border: 1px solid var(--accent); color: var(--accent); width: 100%; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-add:hover { background: var(--accent); color: white; }

        .panel-footer { padding: 20px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.2); }
        .btn-action { width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; font-family: 'Vazirmatn'; margin-bottom: 10px; }
        .btn-approve { background: linear-gradient(135deg, var(--success), #059669); color: white; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2); }
        .btn-approve:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.4); }
        .btn-reject { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-reject:hover { background: rgba(239, 68, 68, 0.1); }

        /* 🗓️ تقویم جراحی */
        .calendar-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); overflow: hidden; }
        .calendar-header { display: flex; background: var(--surface-dark); border-bottom: 1px solid var(--border-color); z-index: 15; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .time-spacer { width: var(--time-col-width); border-left: 1px solid var(--border-color); flex-shrink: 0; }
        .day-header { flex: 1; text-align: center; padding: 15px 0; font-size: 14px; font-weight: bold; border-left: 1px solid var(--border-color); color: var(--text-main); }
        .day-header.friday { border-left: none; color: var(--danger); }

        .calendar-body { flex: 1; overflow-y: auto; position: relative; display: flex; }
        .time-column { width: var(--time-col-width); background: var(--surface-dark); border-left: 1px solid var(--border-color); z-index: 10; flex-shrink: 0; position: relative; }
        .time-label { height: 60px; display: flex; justify-content: center; padding-top: 5px; font-size: 11px; color: var(--text-muted); font-family: monospace; border-bottom: 1px solid transparent; }
        
        .days-grid { flex: 1; display: flex; position: relative; background-image: linear-gradient(var(--border-color) 1px, transparent 1px); background-size: 100% 60px; }
        .day-column { flex: 1; border-left: 1px solid var(--border-color); position: relative; min-height: 100%; }
        .day-column:last-child { border-left: none; }

        /* 🧱 بلوک‌های درسی (Draggable & Resizable) */
        .event-block { position: absolute; left: 4px; right: 4px; border-radius: 8px; padding: 6px 8px; font-size: 11px; cursor: grab; transition: box-shadow 0.2s, background-color 0.2s; overflow: hidden; border-right: 4px solid; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 5; }
        .event-block:active { cursor: grabbing; z-index: 100; box-shadow: 0 10px 25px rgba(0,0,0,0.6); opacity: 0.9; }
        
        .event-time { font-size: 10px; opacity: 0.9; font-family: monospace; margin-bottom: 2px; font-weight: bold; pointer-events: none; }
        .event-title { font-weight: 900; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; font-size: 12px; }
        .event-desc { font-size: 10px; opacity: 0.7; margin-top: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
        .event-delete { position: absolute; top: 5px; left: 5px; font-size: 10px; cursor: pointer; display: none; background: rgba(0,0,0,0.5); border-radius: 4px; padding: 2px 5px; color: white; z-index: 10; }
        .event-block:hover .event-delete { display: block; }

        /* دستگیره تغییر سایز (Resizer) */
        .resizer { position: absolute; bottom: 0; left: 0; right: 0; height: 8px; cursor: ns-resize; background: rgba(255,255,255,0.1); transition: 0.2s; }
        .resizer:hover { background: rgba(255,255,255,0.3); }

        /* رنگ‌بندی داینامیک */
        .event-bio { background: rgba(16, 185, 129, 0.15); border-color: var(--success); color: #34d399; } 
        .event-math { background: rgba(245, 158, 11, 0.15); border-color: var(--warning); color: #fbbf24; } 
        .event-chem { background: rgba(59, 130, 246, 0.15); border-color: var(--accent); color: #60a5fa; } 
        .event-phys { background: rgba(139, 92, 246, 0.15); border-color: var(--purple); color: #c4b5fd; } 
        .event-exam { background: rgba(239, 68, 68, 0.15); border-color: var(--danger); color: #fca5a5; } 
        .event-break { background: rgba(148, 163, 184, 0.1); border-color: var(--text-muted); color: var(--text-muted); border-right-style: dashed; } 
        .event-default { background: rgba(255, 255, 255, 0.1); border-color: #cbd5e1; color: #f8fafc; } 
    </style>
</head>
<body>

    <div class="loader-overlay" id="mainLoader">
        <div class="spinner">⚙️</div>
        <h3 style="color: var(--accent);">آماده‌سازی اتاق جراحی و پردازش تقویم...</h3>
    </div>

    <div class="side-panel">
        <div class="panel-header">
            <a href="quarantine.html" class="btn-back">🔙</a>
            <div class="student-info">
                <h2 id="stName">در حال دریافت...</h2>
                <p id="stMeta">...</p>
            </div>
        </div>

        <div class="panel-body">
            <div class="ai-assistant">
                <div class="ai-text" id="aiAdvice">الگوریتم ریاضی، پارت‌ها را چیده است. لطفاً یادداشت دانش‌آموز را بررسی کنید و در صورت نیاز، پارت‌ها را جابجا کنید.</div>
                <div class="st-note-box">
                    <strong>یادداشت دانش‌آموز:</strong><br>
                    <span id="stNote">در حال پردازش...</span>
                </div>
            </div>

            <div class="add-block-form">
                <div class="form-title">➕ افزودن پارت دستی</div>
                <div class="form-row">
                    <select id="newDay" class="input-css">
                        <option value="شنبه">شنبه</option><option value="یکشنبه">یکشنبه</option>
                        <option value="دوشنبه">دوشنبه</option><option value="سه‌شنبه">سه‌شنبه</option>
                        <option value="چهارشنبه">چهارشنبه</option><option value="پنجشنبه">پنجشنبه</option>
                        <option value="جمعه">جمعه</option>
                    </select>
                    <input type="time" id="newTime" class="input-css" value="16:00">
                </div>
                <div class="form-row">
                    <input type="text" id="newSubject" class="input-css" placeholder="نام درس (مثلاً زیست)">
                    <input type="number" id="newDuration" class="input-css" placeholder="دقیقه" value="90">
                </div>
                <button class="btn-add" onclick="addNewBlock()">تزریق پارت به تقویم</button>
            </div>
        </div>

        <div class="panel-footer">
            <button class="btn-action btn-approve" id="btnApprove" onclick="saveAndApprove()">✅ تأیید و ارسال برنامه</button>
            <button class="btn-action btn-reject" id="btnReject" onclick="rejectSchedule()">❌ رد و حذف برنامه</button>
        </div>
    </div>

    <div class="calendar-container">
        <div class="calendar-header">
            <div class="time-spacer"></div>
            <div class="day-header">شنبه</div><div class="day-header">یکشنبه</div>
            <div class="day-header">دوشنبه</div><div class="day-header">سه‌شنبه</div>
            <div class="day-header">چهارشنبه</div><div class="day-header">پنجشنبه</div>
            <div class="day-header friday">جمعه</div>
        </div>

        <div class="calendar-body" id="scrollArea">
            <div class="time-column" id="timeColumn"></div>
            <div class="days-grid" id="daysGrid">
                <div class="day-column" id="col-0" data-dayindex="0"></div>
                <div class="day-column" id="col-1" data-dayindex="1"></div>
                <div class="day-column" id="col-2" data-dayindex="2"></div>
                <div class="day-column" id="col-3" data-dayindex="3"></div>
                <div class="day-column" id="col-4" data-dayindex="4"></div>
                <div class="day-column" id="col-5" data-dayindex="5"></div>
                <div class="day-column" id="col-6" data-dayindex="6"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات و متغیرهای سراسری
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentScheduleId = null;
        let scheduleDataArray = []; // نگهداری آرایه نهایی برای ذخیره
        
        const daysArr = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
        const dayMap = { 'شنبه': 0, 'یکشنبه': 1, 'دوشنبه': 2, 'سه‌شنبه': 3, 'چهارشنبه': 4, 'پنجشنبه': 5, 'جمعه': 6 };

        // ==========================================
        // 🚀 راه‌اندازی اولیه
        // ==========================================
        window.onload = async function() {
            // رسم ستون ساعت‌ها (از 06:00 تا 24:00)
            const timeCol = document.getElementById('timeColumn');
            for(let i = 6; i <= 24; i++) {
                timeCol.innerHTML += `<div class="time-label">${i.toString().padStart(2, '0')}:00</div>`;
            }

            const urlParams = new URLSearchParams(window.location.search);
            currentScheduleId = urlParams.get('schedule_id');

            if (!currentScheduleId) {
                alert("خطا: هیچ برنامه‌ای انتخاب نشده است!");
                window.location.replace('quarantine.html');
                return;
            }
            await fetchAndRender();
        };

        async function fetchAndRender() {
            try {
                const { data: schData, error: schErr } = await supabaseClient
                    .from('ai_schedules')
                    .select('*')
                    .eq('id', currentScheduleId)
                    .single();
                if (schErr) throw schErr;

                const { data: stData } = await supabaseClient
                    .from('students')
                    .select('full_name, grade, major')
                    .eq('chat_id', schData.chat_id)
                    .single();

                document.getElementById('stName').innerText = stData ? stData.full_name : 'ناشناس';
                document.getElementById('stMeta').innerText = stData ? `${stData.grade} ${stData.major}` : 'اطلاعات نامشخص';
                
                let note = schData.student_note && schData.student_note.trim() !== '' ? schData.student_note : 'بدون یادداشت.';
                document.getElementById('stNote').innerText = note;

                // هوش مصنوعی ساده: هشدار کلمات کلیدی در سایدبار
                if (note.includes("امتحان") || note.includes("مدرسه")) {
                    document.getElementById('aiAdvice').innerHTML = "<span style='color:var(--warning)'>⚠️ توجه: دانش‌آموز امتحان دارد!</span> پارت‌های مربوطه را با موس به روزهای قبل از امتحان بکشید.";
                }

                // کپی کردن آرایه خام به متغیر سراسری
                scheduleDataArray = schData.raw_plan || [];
                renderAllBlocks();

                document.getElementById('mainLoader').style.opacity = '0';
                setTimeout(() => { document.getElementById('mainLoader').style.display = 'none'; }, 500);

                // اسکرول به ساعت 07:00 (60px)
                document.getElementById('scrollArea').scrollTop = 60;

            } catch (err) {
                alert("خطا در بارگذاری: " + err.message);
                window.location.replace('quarantine.html');
            }
        }

        // ==========================================
        // 🎨 موتور رسم (رندر) پارت‌ها
        // ==========================================
        function renderAllBlocks() {
            // پاک کردن تقویم
            for(let i=0; i<=6; i++) {
                document.getElementById(`col-${i}`).innerHTML = '';
            }

            scheduleDataArray.forEach((part, index) => {
                let colIndex = dayMap[part.day];
                if (colIndex === undefined) return;

                let startMins = timeStrToMins(part.start_time);
                let endMins = timeStrToMins(part.end_time);
                
                let topPx = startMins - 360; // ساعت 6 برابر 360 دقیقه است
                let heightPx = endMins - startMins;

                // پیدا کردن رنگ
                let typeClass = "event-default";
                if(part.type) typeClass = `event-${part.type}`;

                const block = document.createElement('div');
                block.className = `event-block ${typeClass}`;
                block.style.top = `${topPx}px`;
                block.style.height = `${heightPx}px`;
                block.dataset.index = index; // کلید اتصال گرافیک به دیتا

                block.innerHTML = `
                    <div class="event-delete" onclick="deleteBlock(${index})">🗑️</div>
                    <div class="event-time">${part.start_time} - ${part.end_time}</div>
                    <div class="event-title">${part.subject}</div>
                    <div class="event-desc">${part.topic || ''}</div>
                    <div class="resizer"></div>
                `;

                // فعال‌سازی رویدادهای Drag و Resize برای این بلوک
                block.addEventListener('mousedown', handleMouseDown);
                document.getElementById(`col-${colIndex}`).appendChild(block);
            });
        }

        // ==========================================
        // 🖱️ موتور بی‌نقص Drag & Drop و Resize
        // ==========================================
        let isDragging = false;
        let isResizing = false;
        let activeBlock = null;
        let activeIndex = -1;
        let startY = 0;
        let initialTop = 0;
        let initialHeight = 0;

        function handleMouseDown(e) {
            if (e.button !== 0) return; // فقط کلیک چپ
            if (e.target.classList.contains('event-delete')) return; // روی دکمه حذف عمل نکند

            activeBlock = e.currentTarget;
            activeIndex = parseInt(activeBlock.dataset.index);
            startY = e.clientY;
            
            initialTop = parseInt(activeBlock.style.top) || 0;
            initialHeight = parseInt(activeBlock.style.height) || 0;

            if (e.target.classList.contains('resizer')) {
                isResizing = true;
            } else {
                isDragging = true;
            }

            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', handleMouseUp);
        }

        function handleMouseMove(e) {
            if (!activeBlock) return;

            let dy = e.clientY - startY;

            if (isResizing) {
                // منطق تغییر سایز (حداقل 15 دقیقه)
                let newHeight = initialHeight + dy;
                newHeight = Math.round(newHeight / 15) * 15; // آهنربای ۱۵ دقیقه‌ای
                if (newHeight < 15) newHeight = 15;
                activeBlock.style.height = `${newHeight}px`;
                updateBlockTimeVisual(activeBlock, initialTop, newHeight);
            } 
            else if (isDragging) {
                // منطق جابجایی عمودی
                let newTop = initialTop + dy;
                newTop = Math.round(newTop / 15) * 15;
                if (newTop < 0) newTop = 0;
                activeBlock.style.top = `${newTop}px`;
                updateBlockTimeVisual(activeBlock, newTop, initialHeight);

                // منطق جابجایی افقی (تشخیص ستون روز)
                const gridRect = document.getElementById('daysGrid').getBoundingClientRect();
                const colWidth = gridRect.width / 7;
                let mouseX = e.clientX - gridRect.left;
                
                if (mouseX >= 0 && mouseX <= gridRect.width) {
                    let hoveredColIndex = Math.floor(mouseX / colWidth);
                    // اگر روز عوض شد، DOM رو به ستون جدید منتقل کن
                    const currentParentId = activeBlock.parentElement.id;
                    if (currentParentId !== `col-${hoveredColIndex}`) {
                        document.getElementById(`col-${hoveredColIndex}`).appendChild(activeBlock);
                    }
                }
            }
        }

        function handleMouseUp(e) {
            document.removeEventListener('mousemove', handleMouseMove);
            document.removeEventListener('mouseup', handleMouseUp);

            if (activeBlock && activeIndex !== -1) {
                // ذخیره تغییرات در آرایه اصلی (Live Sync)
                let finalTop = parseInt(activeBlock.style.top);
                let finalHeight = parseInt(activeBlock.style.height);
                let finalColIndex = parseInt(activeBlock.parentElement.dataset.dayindex);

                let startMins = finalTop + 360;
                let endMins = startMins + finalHeight;

                scheduleDataArray[activeIndex].day = daysArr[finalColIndex];
                scheduleDataArray[activeIndex].start_time = minsToTimeStr(startMins);
                scheduleDataArray[activeIndex].end_time = minsToTimeStr(endMins);

                activeBlock = null;
                isDragging = false;
                isResizing = false;
            }
        }

        // آپدیت متنِ ساعت روی بلوک در حین کشیدن
        function updateBlockTimeVisual(block, top, height) {
            let sMins = top + 360;
            let eMins = sMins + height;
            block.querySelector('.event-time').innerText = `${minsToTimeStr(sMins)} - ${minsToTimeStr(eMins)}`;
        }

        // ==========================================
        // ➕ توابع عملیاتی (حذف و اضافه)
        // ==========================================
        function deleteBlock(index) {
            if(confirm("آیا از حذف این پارت اطمینان دارید؟")) {
                scheduleDataArray.splice(index, 1);
                renderAllBlocks(); // رندر مجدد برای آپدیت ایندکس‌ها
            }
        }

        function addNewBlock() {
            let day = document.getElementById('newDay').value;
            let timeStr = document.getElementById('newTime').value;
            let subject = document.getElementById('newSubject').value;
            let duration = parseInt(document.getElementById('newDuration').value);

            if(!subject) { alert("نام درس را وارد کنید!"); return; }

            let startMins = timeStrToMins(timeStr);
            let endMins = startMins + duration;

            let typeClass = "default";
            if(subject.includes("زیست")) typeClass = "bio";
            else if(subject.includes("ریاضی")) typeClass = "math";
            else if(subject.includes("شیمی")) typeClass = "chem";
            else if(subject.includes("فیزیک")) typeClass = "phys";
            else if(subject.includes("آزمون")) typeClass = "exam";

            scheduleDataArray.push({
                day: day,
                start_time: minsToTimeStr(startMins),
                end_time: minsToTimeStr(endMins),
                subject: subject,
                topic: "اضافه شده توسط مدیریت",
                type: typeClass
            });

            // خالی کردن فرم و رندر مجدد
            document.getElementById('newSubject').value = "";
            renderAllBlocks();
        }

        // ==========================================
        // ✅ توابع دیتابیس (تأیید و ذخیره نهایی)
        // ==========================================
        async function saveAndApprove() {
            const btn = document.getElementById('btnApprove');
            btn.innerHTML = 'در حال ذخیره و ارسال... ⏳';
            btn.disabled = true;

            try {
                // آپدیت آرایه ویرایش‌شده تو دیتابیس و تغییر وضعیت به تایید شده
                const { error } = await supabaseClient
                    .from('ai_schedules')
                    .update({ 
                        raw_plan: scheduleDataArray,
                        status: 'approved' 
                    })
                    .eq('id', currentScheduleId);

                if (error) throw error;
                
                alert("برنامه با موفقیت ذخیره و برای دانش‌آموز ارسال شد! 🚀");
                window.location.replace('quarantine.html');
            } catch (err) {
                alert("خطا در ثبت نهایی: " + err.message);
                btn.innerHTML = '✅ تأیید و ارسال برنامه';
                btn.disabled = false;
            }
        }

        async function rejectSchedule() {
            if(confirm("آیا مطمئن هستید که این برنامه کاملاً پاک شود؟")) {
                const btn = document.getElementById('btnReject');
                btn.innerHTML = 'در حال حذف... ⏳';
                btn.disabled = true;
                try {
                    const { error } = await supabaseClient
                        .from('ai_schedules')
                        .delete()
                        .eq('id', currentScheduleId);

                    if (error) throw error;
                    window.location.replace('quarantine.html');
                } catch (err) {
                    alert("خطا در حذف: " + err.message);
                    btn.innerHTML = '❌ رد و حذف برنامه';
                    btn.disabled = false;
                }
            }
        }

        // ==========================================
        // 🧮 توابع کمکی محاسبات زمان
        // ==========================================
        function timeStrToMins(timeStr) {
            if(!timeStr) return 0;
            let parts = timeStr.split(':');
            return (parseInt(parts[0]) * 60) + parseInt(parts[1]);
        }

        function minsToTimeStr(mins) {
            let h = Math.floor(mins / 60);
            let m = Math.floor(mins % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
        }
    </script>
</body>
