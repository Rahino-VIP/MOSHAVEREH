<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتاق جراحی برنامه | راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-dark: #090e17; --surface-dark: #121b29; --surface-light: #1e293b; --border-color: #334155;
            --accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.2);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8;
            
            --time-col-width: 60px;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* 🎛️ کنسول فرماندهی (سمت راست) */
        .side-panel { width: 320px; background: var(--surface-dark); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; z-index: 20; box-shadow: -5px 0 20px rgba(0,0,0,0.3); }
        
        .panel-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px; }
        .btn-back { background: var(--surface-light); border: 1px solid var(--border-color); color: var(--text-main); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; justify-content: center; align-items: center; text-decoration: none; transition: 0.2s; font-size: 18px; }
        .btn-back:hover { background: var(--danger); border-color: var(--danger); }
        .student-info h2 { font-size: 16px; font-weight: 900; color: var(--accent); margin-bottom: 3px; }
        .student-info p { font-size: 11px; color: var(--text-muted); }

        .panel-body { padding: 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        
        .note-box { background: rgba(245, 158, 11, 0.05); border: 1px dashed var(--warning); padding: 15px; border-radius: 12px; }
        .note-title { font-size: 11px; font-weight: bold; color: var(--warning); margin-bottom: 5px; }
        .note-text { font-size: 13px; line-height: 1.6; color: var(--text-main); }

        .ai-box { flex: 1; background: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .ai-header { background: var(--surface-light); padding: 10px 15px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border-color); color: var(--purple); }
        .ai-input { flex: 1; background: transparent; border: none; color: var(--text-main); padding: 15px; font-size: 13px; resize: none; outline: none; line-height: 1.6; }
        .btn-ai { background: rgba(139, 92, 246, 0.1); color: #c4b5fd; border: none; border-top: 1px solid var(--border-color); padding: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-family: 'Vazirmatn'; }
        .btn-ai:hover { background: var(--purple); color: white; }

        .panel-footer { padding: 20px; border-top: 1px solid var(--border-color); display: flex; flex-direction: column; gap: 10px; }
        .btn-action { padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; font-size: 14px; transition: 0.2s; text-align: center; font-family: 'Vazirmatn'; }
        .btn-approve { background: linear-gradient(135deg, var(--success), #059669); color: white; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.2); }
        .btn-approve:hover { filter: brightness(1.1); transform: translateY(-2px); }
        .btn-reject { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-reject:hover { background: rgba(239, 68, 68, 0.1); }

        /* 🗓️ بوم تقویم (سمت چپ) */
        .calendar-container { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); overflow: hidden; position: relative; }
        
        .calendar-header { display: flex; background: var(--surface-dark); border-bottom: 1px solid var(--border-color); z-index: 15; }
        .time-spacer { width: var(--time-col-width); border-left: 1px solid var(--border-color); flex-shrink: 0; }
        .day-header { flex: 1; text-align: center; padding: 15px 0; font-size: 14px; font-weight: bold; border-left: 1px solid var(--border-color); color: var(--text-main); }
        .day-header.friday { border-left: none; color: var(--danger); }

        .calendar-body { flex: 1; overflow-y: auto; position: relative; display: flex; }
        
        /* ستون ساعت‌ها */
        .time-column { width: var(--time-col-width); background: var(--surface-dark); border-left: 1px solid var(--border-color); position: relative; z-index: 10; flex-shrink: 0; }
        .time-label { height: 60px; border-bottom: 1px solid transparent; display: flex; justify-content: center; align-items: flex-start; padding-top: 5px; font-size: 10px; color: var(--text-muted); font-family: monospace; }
        
        /* شبکه روزها */
        .days-grid { flex: 1; display: flex; position: relative; background-image: linear-gradient(var(--border-color) 1px, transparent 1px); background-size: 100% 60px; }
        .day-column { flex: 1; border-left: 1px solid var(--border-color); position: relative; }
        .day-column:last-child { border-left: none; }

        /* 🧱 بلوک‌های درسی */
        .event-block { position: absolute; left: 5px; right: 5px; border-radius: 8px; padding: 8px 10px; font-size: 12px; cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; overflow: hidden; border-right: 4px solid; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .event-block:hover { transform: scale(1.02); z-index: 100; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .event-time { font-size: 10px; opacity: 0.8; font-family: monospace; margin-bottom: 2px; }
        .event-title { font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-desc { font-size: 10px; opacity: 0.7; margin-top: auto; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* رنگ‌بندی بلوک‌ها (مدیریت توسط جاوااسکریپت) */
        .event-bio { background: rgba(16, 185, 129, 0.15); border-color: var(--success); color: #34d399; } /* زیست */
        .event-math { background: rgba(245, 158, 11, 0.15); border-color: var(--warning); color: #fbbf24; } /* ریاضی */
        .event-chem { background: rgba(59, 130, 246, 0.15); border-color: var(--accent); color: #60a5fa; } /* شیمی */
        .event-phys { background: rgba(139, 92, 246, 0.15); border-color: var(--purple); color: #c4b5fd; } /* فیزیک */
        .event-exam { background: rgba(239, 68, 68, 0.15); border-color: var(--danger); color: #fca5a5; } /* آزمون */
        .event-break { background: rgba(148, 163, 184, 0.1); border-color: var(--text-muted); color: var(--text-muted); background-image: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 20px); } /* استراحت/مدرسه */
        .event-default { background: rgba(255, 255, 255, 0.1); border-color: #cbd5e1; color: #f8fafc; } /* سایر دروس */

        /* لودر امنیتی و دیتا */
        .loader-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

    <div class="loader-overlay" id="mainLoader">
        <h3 style="color: var(--accent); margin-bottom: 10px;">در حال دریافت اطلاعات بیمار (برنامه)...</h3>
        <p style="color: var(--text-muted); font-size: 13px;">لطفاً منتظر بمانید</p>
    </div>

    <div class="side-panel">
        <div class="panel-header">
            <a href="quarantine.html" class="btn-back">🔙</a>
            <div class="student-info">
                <h2 id="stName">در حال بارگذاری...</h2>
                <p id="stMeta">پایه و رشته</p>
            </div>
        </div>

        <div class="panel-body">
            <div class="note-box">
                <div class="note-title">یادداشت دانش‌آموز برای این هفته:</div>
                <div class="note-text" id="stNote">در حال دریافت...</div>
            </div>

            <div class="ai-box">
                <div class="ai-header">🤖 ترمینال دستور به هوش مصنوعی</div>
                <textarea class="ai-input" id="aiPromptInput" placeholder="دستورات اصلاحی را اینجا بنویسید... (مثال: برنامه سه‌شنبه خیلی سبک است، دو پارت فیزیک اضافه کن)"></textarea>
                <button class="btn-ai" onclick="alert('ارتباط با هوش مصنوعی در این نسخه دموی جراحی غیرفعال است.')">بازسازی برنامه با هوش مصنوعی 🔄</button>
            </div>
        </div>

        <div class="panel-footer">
            <button class="btn-action btn-approve" id="btnApprove" onclick="approveSchedule()">✅ تأیید و ارسال برنامه</button>
            <button class="btn-action btn-reject" id="btnReject" onclick="rejectSchedule()">❌ رد برنامه و بازگشت</button>
        </div>
    </div>

    <div class="calendar-container">
        
        <div class="calendar-header">
            <div class="time-spacer"></div>
            <div class="day-header">شنبه</div>
            <div class="day-header">یکشنبه</div>
            <div class="day-header">دوشنبه</div>
            <div class="day-header">سه‌شنبه</div>
            <div class="day-header">چهارشنبه</div>
            <div class="day-header">پنجشنبه</div>
            <div class="day-header friday">جمعه</div>
        </div>

        <div class="calendar-body" id="scrollArea">
            <div class="time-column" id="timeColumn"></div>

            <div class="days-grid" id="daysGrid">
                <div class="day-column" id="col-0"></div> <div class="day-column" id="col-1"></div> <div class="day-column" id="col-2"></div> <div class="day-column" id="col-3"></div> <div class="day-column" id="col-4"></div> <div class="day-column" id="col-5"></div> <div class="day-column" id="col-6"></div> </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات اتصال سوپابیس
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // متغیرهای سراسری برای نگه داشتن اطلاعات رکورد
        let currentScheduleId = null;

        // نقشه‌برداری روزهای هفته به ایندکس ستون‌ها
        const dayMap = {
            'شنبه': 0, 'یکشنبه': 1, 'دوشنبه': 2, 'سه‌شنبه': 3, 'چهارشنبه': 4, 'پنجشنبه': 5, 'جمعه': 6
        };

        window.onload = async function() {
            // ۱. چک کردن دسترسی ادمین
            const { data: { session }, error: authError } = await supabaseClient.auth.getSession();
            if (authError || !session) {
                window.location.replace('index.html');
                return;
            }

            // ۲. تولید ستون ساعت‌ها (از 6 صبح تا 24 شب)
            const timeCol = document.getElementById('timeColumn');
            for(let i = 6; i <= 24; i++) {
                let timeText = (i < 10 ? '0'+i : i) + ':00';
                timeCol.innerHTML += `<div class="time-label">${timeText}</div>`;
            }

            // ۳. دریافت آیدی برنامه از لینک (URL Parameters)
            const urlParams = new URLSearchParams(window.location.search);
            currentScheduleId = urlParams.get('schedule_id');

            if (!currentScheduleId) {
                alert("خطا: هیچ برنامه‌ای برای جراحی انتخاب نشده است!");
                window.location.replace('quarantine.html');
                return;
            }

            // ۴. بارگذاری اطلاعات از دیتابیس
            await fetchAndRenderSchedule();
        };

        // ==========================================
        // 📥 تابع دریافت برنامه و رسم تقویم
        // ==========================================
        async function fetchAndRenderSchedule() {
            try {
                // دریافت رکورد برنامه از جدول قرنطینه
                const { data: scheduleData, error: scheduleError } = await supabaseClient
                    .from('ai_schedules')
                    .select('*')
                    .eq('id', currentScheduleId)
                    .single();

                if (scheduleError) throw scheduleError;

                // دریافت اطلاعات دانش‌آموز
                const { data: studentData } = await supabaseClient
                    .from('students')
                    .select('full_name, grade, major')
                    .eq('chat_id', scheduleData.chat_id)
                    .single();

                // پر کردن اطلاعات پنل راست
                document.getElementById('stName').innerText = studentData ? studentData.full_name : 'ناشناس';
                document.getElementById('stMeta').innerText = studentData ? `${studentData.grade} ${studentData.major} | ${scheduleData.week_label}` : 'اطلاعات نامشخص';
                document.getElementById('stNote').innerText = (scheduleData.student_note && scheduleData.student_note.trim() !== '') ? scheduleData.student_note : 'بدون یادداشت.';

                // رسم بلوک‌های تقویم
                if (scheduleData.raw_plan && Array.isArray(scheduleData.raw_plan)) {
                    renderCalendarBlocks(scheduleData.raw_plan);
                }

                // پنهان کردن لودینگ
                document.getElementById('mainLoader').style.display = 'none';

                // اسکرول اتوماتیک تقویم به ساعت 7 صبح (60px)
                setTimeout(() => {
                    document.getElementById('scrollArea').scrollTop = 60;
                }, 100);

            } catch (error) {
                console.error("Fetch Error:", error);
                alert("خطا در بارگذاری اطلاعات برنامه. لطفاً دوباره تلاش کنید.");
                window.location.replace('quarantine.html');
            }
        }

        // ==========================================
        // 🎨 تابع جادویی تبدیل JSON به بلوک‌های تقویم
        // ==========================================
        function renderCalendarBlocks(planArray) {
            planArray.forEach(part => {
                // پیدا کردن ستون مربوط به روز
                const colIndex = dayMap[part.day];
                if (colIndex === undefined) return; // اگر روز نامعتبر بود رد شو
                const targetColumn = document.getElementById(`col-${colIndex}`);

                // تبدیل ساعت‌ها به پیکسل
                let startParts = part.start_time.split(':');
                let endParts = part.end_time.split(':');
                
                let startMinutes = (parseInt(startParts[0]) * 60) + parseInt(startParts[1]);
                let endMinutes = (parseInt(endParts[0]) * 60) + parseInt(endParts[1]);

                // ساعت 6 صبح برابر 360 دقیقه است. هر پیکسل مساوی یک دقیقه است.
                let topOffset = startMinutes - 360;
                let duration = endMinutes - startMinutes;

                // پیدا کردن رنگ مناسب بر اساس کلمه کلیدی یا نوع
                let typeClass = 'event-default';
                let subjectName = part.subject || '';
                let typeStr = part.type || '';
                
                if (typeStr.includes('bio') || subjectName.includes('زیست')) typeClass = 'event-bio';
                else if (typeStr.includes('math') || subjectName.includes('ریاضی') || subjectName.includes('هندسه')) typeClass = 'event-math';
                else if (typeStr.includes('chem') || subjectName.includes('شیمی')) typeClass = 'event-chem';
                else if (typeStr.includes('phys') || subjectName.includes('فیزیک')) typeClass = 'event-phys';
                else if (typeStr.includes('exam') || subjectName.includes('آزمون')) typeClass = 'event-exam';
                else if (typeStr.includes('break') || subjectName.includes('ناهار') || subjectName.includes('شام') || subjectName.includes('استراحت')) typeClass = 'event-break';

                // ساخت HTML بلوک
                const blockHTML = `
                    <div class="event-block ${typeClass}" style="top: ${topOffset}px; height: ${duration}px;" title="${part.topic || ''}">
                        <div class="event-time">${part.start_time} - ${part.end_time}</div>
                        <div class="event-title">${part.subject}</div>
                        <div class="event-desc">${part.topic || ''}</div>
                    </div>
                `;

                targetColumn.innerHTML += blockHTML;
            });
            // بعد از اینکه تمام HTML بلوک‌ها ساخته و به صفحه اضافه شد:
initDragAndDrop();
        }

        // ==========================================
        // ✅ توابع تأیید و رد
        // ==========================================
        async function approveSchedule() {
            const btn = document.getElementById('btnApprove');
            btn.innerHTML = 'در حال ثبت... ⏳';
            btn.disabled = true;

            try {
                const { error } = await supabaseClient
                    .from('ai_schedules')
                    .update({ status: 'approved' })
                    .eq('id', currentScheduleId);

                if (error) throw error;
                
                alert("مُهر تأیید زده شد! تقویم مستقیماً برای دانش‌آموز ارسال گردید.");
                window.location.replace('quarantine.html');
            } catch (err) {
                alert("خطا در تأیید: " + err.message);
                btn.innerHTML = '✅ تأیید و ارسال برنامه';
                btn.disabled = false;
            }
        }

        async function rejectSchedule() {
            if(confirm("آیا مطمئن هستید که این برنامه رد شود و به سطل زباله برود؟")) {
                const btn = document.getElementById('btnReject');
                btn.innerHTML = 'در حال حذف... ⏳';
                btn.disabled = true;

                try {
                    const { error } = await supabaseClient
                        .from('ai_schedules')
                        .update({ status: 'rejected' })
                        .eq('id', currentScheduleId);

                    if (error) throw error;
                    window.location.replace('quarantine.html');
                } catch (err) {
                    alert("خطا در رد برنامه: " + err.message);
                    btn.innerHTML = '❌ رد برنامه و بازگشت';
                    btn.disabled = false;
                }
            }
        }
        // ==========================================
        // 🖱️ سیستم Drag & Drop (مانند گوگل کلندر)
        // ==========================================
        let draggedBlock = null;
        let startY = 0;
        let originalTop = 0;

        // این تابع بعد از رسم شدن بلوک‌ها باید فراخوانی شود
        function initDragAndDrop() {
            const blocks = document.querySelectorAll('.event-block');
            
            blocks.forEach(block => {
                block.onmousedown = function(e) {
                    // فقط با کلیک چپ کار کند
                    if (e.button !== 0) return; 
                    
                    draggedBlock = this;
                    startY = e.clientY;
                    originalTop = parseInt(this.style.top || 0);
                    
                    this.style.zIndex = 1000;
                    this.style.cursor = 'grabbing';
                    this.style.opacity = '0.9';
                    this.style.boxShadow = '0 10px 25px rgba(0,0,0,0.5)';
                };
            });

            document.onmousemove = function(e) {
                if (!draggedBlock) return;
                
                // محاسبه میزان جابجایی موس
                let dy = e.clientY - startY;
                let newTop = originalTop + dy;
                
                // خاصیت آهنربایی: چسبیدن به فواصل ۱۵ پیکسلی (۱۵ دقیقه‌ای)
                newTop = Math.round(newTop / 15) * 15;
                
                // جلوگیری از خروج از تقویم (قبل از ۶ صبح)
                if (newTop < 0) newTop = 0; 
                
                draggedBlock.style.top = newTop + 'px';
                
                // آپدیت زنده ساعت روی بلوک
                updateBlockTimeText(draggedBlock, newTop);
            };

            document.onmouseup = function() {
                if (draggedBlock) {
                    draggedBlock.style.zIndex = '';
                    draggedBlock.style.cursor = 'pointer';
                    draggedBlock.style.opacity = '1';
                    draggedBlock.style.boxShadow = '';
                    
                    // در نسخه نهایی باید این تغییر رو تو آرایه‌ی JSON ذخیره کنیم
                    console.log("پارت جابجا شد! ساعت جدید:", draggedBlock.querySelector('.event-time').innerText);
                    
                    draggedBlock = null;
                }
            };
        }

        // ==========================================
        // ⏱️ تبدیل پیکسل به ساعت (محاسبه زنده)
        // ==========================================
        function updateBlockTimeText(block, topPx) {
            // ساعت 6 صبح = 360 دقیقه از نیمه‌شب
            let totalMinutesStart = 360 + topPx;
            let duration = parseInt(block.style.height); // ارتفاع بلوک مساوی با دقیقه است
            let totalMinutesEnd = totalMinutesStart + duration;

            let sh = Math.floor(totalMinutesStart / 60);
            let sm = totalMinutesStart % 60;
            let eh = Math.floor(totalMinutesEnd / 60);
            let em = totalMinutesEnd % 60;

            // فرمت کردن به شکل 00:00
            let timeStr = `${sh.toString().padStart(2,'0')}:${sm.toString().padStart(2,'0')} - ${eh.toString().padStart(2,'0')}:${em.toString().padStart(2,'0')}`;
            block.querySelector('.event-time').innerText = timeStr;
        }
    </script>
</body>
</html>
