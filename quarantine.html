<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قرنطینه برنامه‌ها | راهینو</title>
    <link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --bg-dark: #090e17; --surface-dark: #121b29; --surface-light: #1e293b; --border-color: #334155;
            --accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.2);
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --purple: #8b5cf6;
            --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Vazirmatn', sans-serif; margin: 0; padding: 0; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* 📁 سایدبار */
        .sidebar { width: 260px; background: var(--surface-dark); border-left: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 20px 0; z-index: 10; }
        .brand { text-align: center; font-size: 20px; font-weight: 900; color: var(--text-main); margin-bottom: 30px; letter-spacing: 1px; }
        .brand span { color: var(--accent); }
        .nav-item { padding: 15px 25px; cursor: pointer; color: var(--text-muted); font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 10px; transition: 0.3s; border-right: 3px solid transparent; text-decoration: none; }
        .nav-item:hover { background: rgba(255,255,255,0.02); color: var(--text-main); }
        .nav-item.active { background: linear-gradient(90deg, var(--accent-glow) 0%, transparent 100%); color: var(--accent); border-right-color: var(--accent); }
        
        /* 🖥️ محتوای اصلی */
        .main-content { flex: 1; padding: 30px 40px; overflow-y: auto; position: relative; }
        .page-header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 24px; font-weight: 900; display: flex; align-items: center; gap: 10px; }
        
        .header-stats { display: flex; gap: 15px; }
        .h-stat { background: var(--surface-dark); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 12px; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .h-stat span { color: var(--warning); font-size: 16px; }

        /* ⏳ کارت‌های قرنطینه */
        .quarantine-grid { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        
        .q-card { background: var(--surface-dark); border: 1px solid var(--border-color); border-radius: 16px; padding: 20px; position: relative; overflow: hidden; display: flex; gap: 20px; align-items: stretch; transition: 0.3s; border-right: 4px solid var(--warning); }
        .q-card:hover { transform: translateX(-5px); box-shadow: 5px 10px 20px rgba(0,0,0,0.2); }
        
        .q-info { flex: 1; display: flex; flex-direction: column; justify-content: space-between; border-left: 1px solid var(--border-color); padding-left: 20px; }
        .s-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .s-name { font-size: 18px; font-weight: bold; color: var(--text-main); margin-bottom: 5px; }
        .s-tags { display: flex; gap: 8px; }
        .s-tag { font-size: 11px; padding: 4px 8px; border-radius: 6px; background: var(--surface-light); color: var(--text-muted); }
        
        .s-note { background: rgba(245, 158, 11, 0.05); border: 1px dashed rgba(245, 158, 11, 0.3); padding: 12px; border-radius: 10px; font-size: 12px; color: var(--text-main); line-height: 1.6; }
        .s-note span { color: var(--warning); font-weight: bold; display: block; margin-bottom: 3px; font-size: 11px; }

        .q-ai-status { width: 250px; padding: 0 20px; display: flex; flex-direction: column; justify-content: center; gap: 10px; border-left: 1px solid var(--border-color); }
        .ai-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .ai-metric { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; }
        .ai-metric.good { color: var(--success); }
        
        .q-actions { width: 200px; display: flex; flex-direction: column; justify-content: center; gap: 10px; }
        .btn { padding: 12px; border-radius: 10px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; text-align: center; text-decoration: none; display: block; width: 100%; font-family: 'Vazirmatn'; }
        
        .btn-surgery { background: rgba(59, 130, 246, 0.1); color: var(--accent); border: 1px solid rgba(59, 130, 246, 0.3); }
        .btn-surgery:hover { background: var(--accent); color: white; }
        
        .btn-quick { background: transparent; color: var(--success); border: 1px solid var(--success); }
        .btn-quick:hover { background: var(--success); color: white; }

        /* لودر امنیتی */
        .loader-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-dark); display: flex; justify-content: center; align-items: center; z-index: 1000; flex-direction: column; }
    </style>
</head>
<body>

    <div class="loader-overlay" id="authLoader">
        <h3 style="color: var(--accent);">در حال اعتبارسنجی دسترسی فرمانده...</h3>
    </div>

    <div class="sidebar">
        <div class="brand">قطب‌نمای <span>راهینو</span></div>
        
        <a href="dashboard.html" class="nav-item active"><span>🌅</span> داشبورد مرکزی</a>
        <a href="students.html" class="nav-item"><span>👥</span> پرونده دانش‌آموزان (CRM)</a>
        <a href="quarantine.html" class="nav-item"><span>⏳</span> آزمایشگاه برنامه‌ریزی</a>
        <a href="exam-surgery.html" class="nav-item"><span>🔬</span> جراحی کارنامه (AI)</a>
        <a href="settings.html" class="nav-item"><span>⚙️</span> تنظیمات و ترمینال هسته</a>
        
        <a href="#" class="nav-item logout-btn" onclick="handleLogout()"><span>🚪</span> خروج از سیستم</a>
    </div>

    <div class="main-content">
        
        <div class="page-header">
            <h1 class="page-title">
                ⏳ قرنطینه برنامه‌ها
                <span style="font-size: 13px; font-weight: normal; color: var(--text-muted); background: var(--surface-light); padding: 5px 10px; border-radius: 8px;">منتظر تأیید نهایی شما</span>
            </h1>
            
            <div class="header-stats">
                <div class="h-stat"><span id="pendingCount">۰</span> پرونده در صف بررسی</div>
            </div>
        </div>

        <div class="quarantine-grid" id="quarantineGrid">
            </div>

    </div>

    <script>
        // ==========================================
        // 🔗 تنظیمات اتصال سوپابیس
        // ==========================================
        const SUPABASE_URL = 'https://etlutqwwqeahevsskjih.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV0bHV0cXd3cWVhaGV2c3NramloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2MTYwNjIsImV4cCI6MjA5NzE5MjA2Mn0.kXvSQtGM7w28IffQ4JOtv_xtHenyDV0tC70bOd7N7nQ'; 
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = async function() {
            try {
                // ۱. چک کردن دسترسی ادمین
                const { data: { session }, error } = await supabaseClient.auth.getSession();
                
                if (error || !session) {
                    window.location.replace('index.html');
                    return; // توقف اجرای بقیه کدها
                }

                // اگر سشن معتبر بود، همون اول لودر رو مخفی کن
                document.getElementById('authLoader').style.display = 'none';

                // ۲. شروع فرایند خواندن اطلاعات از دیتابیس
                await loadQuarantineSchedules();

            } catch (err) {
                console.error("Auth Error:", err);
                alert("خطا در تایید هویت. لطفاً دوباره وارد شوید.");
                window.location.replace('index.html');
            }
        };

        // ==========================================
        // 📥 تابع دریافت و رندر برنامه‌های قرنطینه
        // ==========================================
        // ==========================================
        // 📥 بارگذاری برنامه‌های در انتظار (قرنطینه)
        // ==========================================
        async function loadQuarantineSchedules() {
            const container = document.getElementById('quarantineList');
            container.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding: 40px;">در حال اسکن اتاق قرنطینه... ⏳</div>';

            try {
                // ۱. مشکل یادداشت: student_note به لیست دریافت اضافه شد
                const { data, error } = await supabaseClient
                    .from('ai_schedules')
                    .select('id, created_at, national_id, week_label, status, raw_plan, student_note')
                    .eq('status', 'pending')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                document.getElementById('pendingCount').innerText = data.length;

                if (data.length === 0) {
                    container.innerHTML = `
                        <div style="text-align:center; padding: 60px 20px; background: rgba(255,255,255,0.02); border-radius: 20px; border: 1px dashed var(--border-color);">
                            <div style="font-size: 48px; margin-bottom: 20px; opacity: 0.5;">☕</div>
                            <h3 style="color: var(--text-muted); font-weight: 400;">اتاق قرنطینه خالی است!</h3>
                            <p style="font-size: 14px; color: #64748b; margin-top: 10px;">فعلاً هیچ درخواست جدیدی نیومده.</p>
                        </div>
                    `;
                    return;
                }

                const cardsHtml = await Promise.all(data.map(async (item) => {
                    const dateObj = new Date(item.created_at);
                    const pDate = new Intl.DateTimeFormat('fa-IR', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }).format(dateObj);

                    const { data: stData } = await supabaseClient
                        .from('students').select('full_name, grade, major').eq('national_id', item.national_id).single();

                    let planArr = typeof item.raw_plan === 'string' ? JSON.parse(item.raw_plan) : item.raw_plan;
                    
                    // ۳. مشکل آمار: فیلتر کردن پارت‌های متفرقه و محاسبه مجموع تست‌ها
                    let studyBlocks = [];
                    let totalTests = 0;
                    
                    if (planArr && Array.isArray(planArr)) {
                        studyBlocks = planArr.filter(b => b.type !== 'class' && b.type !== 'break' && b.type !== 'makeup');
                        // جمع زدن تعداد تست‌ها از روی فیلد tests
                        totalTests = studyBlocks.reduce((sum, b) => sum + (parseInt(b.tests) || 0), 0);
                    }

                    // جایگذاری یادداشت
                    let note = item.student_note && item.student_note.trim() !== '' ? item.student_note : 'دانش‌آموز یادداشتی ثبت نکرده است.';

                    return `
                        <div class="q-card" id="card-${item.id}">
                            <div class="q-header">
                                <div class="student-info">
                                    <div class="avatar">${stData ? stData.full_name.charAt(0) : '?'}</div>
                                    <div>
                                        <div class="st-name">${stData ? stData.full_name : 'دانش‌آموز ناشناس'}</div>
                                        <div class="st-date">درخواست در: ${pDate}</div>
                                    </div>
                                </div>
                                <div class="q-status status-pending">نیاز به جراحی ✂️</div>
                            </div>
                            
                            <div class="q-body">
                                <div class="q-meta">
                                    <span>📅 آزمون ${item.week_label.replace('آمادگی آزمون ', '')}</span>
                                    <span>🎓 ${stData ? stData.grade + ' ' + stData.major : 'پایه و رشته نامشخص'}</span>
                                </div>
                                
                                <div class="q-meta" style="margin-top: 10px;">
                                    <span style="background: rgba(59, 130, 246, 0.1); color: var(--accent);">📚 ${studyBlocks.length} پارت درسی</span>
                                    <span style="background: rgba(16, 185, 129, 0.1); color: var(--success);">🎯 ${totalTests} تست هدف</span>
                                </div>
                                
                                <div class="q-note">
                                    <strong>📝 یادداشت دانش‌آموز:</strong><br>
                                    ${note}
                                </div>
                            </div>
                            
                            <div class="q-actions">
                                <button class="btn btn-primary" onclick="window.location.href='surgery.html?schedule_id=${item.id}'">
                                    <span>ورود به اتاق جراحی</span>
                                    <span>🩺</span>
                                </button>
                                <button class="btn btn-outline" onclick="quickApprove('${item.id}')" title="تایید سریع بدون تغییر">✅</button>
                            </div>
                        </div>
                    `;
                }));

                container.innerHTML = cardsHtml.join('');

            } catch (err) {
                console.error(err);
                container.innerHTML = `<div style="text-align:center; color: var(--danger); padding: 20px;">❌ خطا در دریافت اطلاعات: ${err.message}</div>`;
            }
        }

        // ==========================================
        // ✅ تابع تایید سریع
        // ==========================================
        async function quickApprove(scheduleId) {
            if(confirm("آیا مطمئن هستید که این برنامه بدون بررسی در اتاق جراحی، تایید شود؟")) {
                try {
                    const { error } = await supabaseClient
                        .from('ai_schedules')
                        .update({ status: 'approved' })
                        .eq('id', scheduleId);

                    if (error) throw error;

                    const card = document.getElementById(`card-${scheduleId}`);
                    card.style.opacity = '0';
                    card.style.transform = 'translateX(50px)';
                    
                    setTimeout(() => {
                        card.remove();
                        let countSpan = document.getElementById('pendingCount');
                        if(countSpan) countSpan.innerText = Math.max(0, parseInt(countSpan.innerText) - 1);
                        
                        // چک کردن اینکه آیا لیست خالی شده یا نه
                        if (document.querySelectorAll('.q-card').length === 0) {
                            loadQuarantineSchedules(); // فراخوانی مجدد برای نمایش پیام "لیست خالی است"
                        }
                    }, 300);

                } catch(err) {
                    alert("خطا در تایید برنامه: " + err.message);
                }
            }
        }
    </script>
</body>
</html>
